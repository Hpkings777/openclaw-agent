name: Build OpenClaw Agent

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /tmp/apktool.jar
          echo 'java -jar /tmp/apktool.jar "$@"' | tee /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool

      - name: Download original APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.0.2-original --pattern 'app.apk' --dir /tmp

      - name: Decode APK
        run: apktool d /tmp/app.apk -o /tmp/decode/

      - name: Apply patches
        run: bash scripts/patch.sh /tmp/decode/

      - name: Build APK
        run: apktool b /tmp/decode/ -o /tmp/unsigned.apk

      - name: Sign APK (debug)
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=OpenClaw Agent, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=US"
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name apksigner 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" sign --ks /tmp/debug.keystore \
              --ks-pass pass:android --ks-key-alias debug \
              --out openclaw-agent.apk /tmp/unsigned.apk
          else
            # Fallback: use apksigner from PATH or install build-tools
            yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0" > /dev/null 2>&1
            /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks /tmp/debug.keystore \
              --ks-pass pass:android --ks-key-alias debug \
              --out openclaw-agent.apk /tmp/unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-agent-v1.0.2
          path: openclaw-agent.apk
